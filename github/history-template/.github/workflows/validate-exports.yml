name: Validate spoon-history exports

on:
  push:
    paths:
      - "tasks/**"
      - "scripts/**"
      - ".github/workflows/validate-exports.yml"
  pull_request:
    paths:
      - "tasks/**"
      - "scripts/**"
      - ".github/workflows/validate-exports.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Spoon export validator
        run: pip install "spoon @ git+https://github.com/YOUR_GITHUB_USER/spoon.git"
      - name: Validate task exports
        run: python scripts/validate_exports.py --root tasks
